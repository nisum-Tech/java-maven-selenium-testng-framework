# Base URL for the API under test.
# Override at runtime: -Dapi.base.url=https://staging.example.com
api.base.url=https://reqres.in/api

# Connection and read timeouts (seconds)
api.connect.timeout.seconds=10
api.read.timeout.seconds=30

# Optional static bearer token — leave blank when auth is obtained per-test
api.bearer.token=
